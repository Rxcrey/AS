<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de prioridades</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap');
    </style>
</head>

<body>

    <header>
        <h1 class="p-7 text-center text-white border border-color-50">
            Lista de tarefas
        </h1>
    </header>

    <!-- container -->
    <div id="area" class="max-w-4xl mx-auto p-4 border-2 border-gray-400">

        <main class="text-center">

            <!-- adicionar coisas -->
            <div class="flex flex-col md:flex-row gap-2 md:gap-4 items-stretch md:items-center">

                <label>Nome:</label>

                <input id="caractere"
                    type="text"
                    placeholder="Campo para digitar"
                    class="w-full">

                <select id="prioridade"
                    class="w-full md:w-auto">

                    <option value="alta">Alta</option>
                    <option value="media">Media</option>
                    <option value="baixa">Baixa</option>

                </select>

                <button id="btnAdd" class="w-full md:w-auto">
                    Adicionar
                </button>

            </div>

            <!-- legenda -->
            <div class="flex flex-wrap gap-6 justify-center mt-4">
                <p>Alta - 🔴</p>
                <p>Media - 🟡</p>
                <p>Baixa - 🟢</p>
            </div>

            <!-- contadores -->
            <div class="p-4 flex flex-col md:flex-row justify-center gap-6">
                <p>Pendentes: <span id="pendentes">0</span></p>
                <p>Concluidas: <span id="concluidas">0</span></p>
            </div>

            <!-- listas -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4 text-left">

                <div>
                    <h2>Lista de Prioridade</h2>
                    <ul id="lista"></ul>
                </div>

                <div>
                    <h2>Lista de Concluidos</h2>
                    <ul id="concluido"></ul>
                </div>

            </div>

        </main>
    </div>

    <script src="./script.js"></script>
</body>

</html>
